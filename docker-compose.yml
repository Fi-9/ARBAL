version: '3.8'

services:
  # 1. PostgreSQL 17 Database
  db:
    image: postgres:17-alpine
    container_name: arbal-database
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-arbal_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-arbal_secure_pass_2026}
      - POSTGRES_DB=${POSTGRES_DB:-arbal_db}
      - TZ=Asia/Jakarta
    volumes:
      - pgdata_v17:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arbal_admin} -d ${POSTGRES_DB:-arbal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 2. NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arbal-backend
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER:-arbal_admin}:${POSTGRES_PASSWORD:-arbal_secure_pass_2026}@db:5432/${POSTGRES_DB:-arbal_db}
      - JWT_SECRET=${JWT_SECRET:-arbal_jwt_secret_key_change_me_in_prod}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-arbal_jwt_refresh_secret_key_change_me_in_prod}
      - CORS_ORIGINS=https://arsip.smkmustaqbal.sch.id,http://localhost,http://localhost:3000,http://192.168.100.112
      - APP_URL=${APP_URL:-https://arsip.smkmustaqbal.sch.id}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_BUILD=${APP_BUILD:-development}
      - TZ=Asia/Jakarta
      - MAX_BACKUPS=${MAX_BACKUPS:-30}
      - RETENTION_DAYS=${RETENTION_DAYS:-90}
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # 3. React Frontend (served via Nginx and Reverse Proxying /api to Backend)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: arbal-frontend
    environment:
      - TZ=Asia/Jakarta
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata_v17:
  uploads_data:
  backups_data:
