version: '3.8'

services:
  # 1. PostgreSQL 17 Database
  db:
    image: postgres:17-alpine
    container_name: arbal-database
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-arbal_db}
      - TZ=Asia/Jakarta
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-arbal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net
    restart: unless-stopped

  # 2. NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: arbal-backend
    environment:
      - PORT=3001
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-arbal_db}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://arsip.insanmustaqbal.or.id,http://localhost,http://localhost:3000,http://192.168.100.112}
      - APP_URL=${APP_URL:-https://arsip.insanmustaqbal.or.id}
      - OCR_SERVICE_URL=${OCR_SERVICE_URL:-http://ocr:8000}
      - OCR_INTERNAL_TOKEN=${OCR_INTERNAL_TOKEN:-}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_BUILD=${APP_BUILD:-development}
      - TZ=Asia/Jakarta
      - MAX_BACKUPS=${MAX_BACKUPS:-30}
      - RETENTION_DAYS=${RETENTION_DAYS:-90}
    volumes:
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped

  # 3. Optional Python OCR Microservice
  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
      network: host
    container_name: arbal-ocr
    profiles:
      - ocr
    environment:
      - PORT=8000
      - CORS_ORIGIN=${OCR_CORS_ORIGIN:-http://backend:3001}
      - OCR_INTERNAL_TOKEN=${OCR_INTERNAL_TOKEN:-}
      - LOG_LEVEL=${OCR_LOG_LEVEL:-INFO}
      - PADDLE_LANG=${PADDLE_LANG:-id}
      - PADDLE_USE_GPU=${PADDLE_USE_GPU:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-net
    restart: unless-stopped

  # 4. React Frontend (served via Nginx and Reverse Proxying /api to Backend)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        - VITE_API_BASE_URL=/api/v1
    container_name: arbal-frontend
    environment:
      - TZ=Asia/Jakarta
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend-net
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
  backups_data:

networks:
  frontend-net:
  backend-net:
